# ============================================================
# 云计算技术课程设计 — Secret（敏感配置）
# 生成 base64 密码命令：echo -n "mypassword" | base64
# 示例中 mypassword 的 base64 编码为：bXlwYXNzd29yZA==
# 部署前请替换为你的实际密码！
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: default
type: Opaque
data:
  REDIS_PASSWORD: bXlwYXNzd29yZA==   # mypassword 的 base64 编码，请替换
