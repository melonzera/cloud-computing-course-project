# ============================================================
# 云计算技术课程设计 — Service
# 后端 LoadBalancer（绑定华为云 ELB）+ Redis ClusterIP（仅内部可达）
# ============================================================

# ── 后端 Service（对外暴露，绑定华为云 ELB） ──────────
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: default
  annotations:
    kubernetes.io/elb.class: union    # 华为云必填注解，绑定 ELB
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http

---
# ── Redis Service（集群内部访问） ────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
