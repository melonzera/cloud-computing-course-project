<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云计算技术课程设计</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 40px 60px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 { color: #667eea; margin-bottom: 8px; }
        .subtitle { color: #888; margin-bottom: 24px; }
        .info { background: #f7f8fc; border-radius: 8px; padding: 16px; margin: 8px 0; text-align: left; }
        .info span { font-weight: bold; color: #667eea; }
        .status { color: #22c55e; font-weight: bold; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>云计算技术课程设计</h1>
        <p class="subtitle">Cloud Computing Technology — Course Project</p>
        <div class="info">
            <p><span>学号：</span>XXXXXXXXXX</p>
            <p><span>姓名：</span>XXX</p>
            <p><span>课程代码：</span>SCAI004712</p>
            <p><span>学期：</span>2026年春季学期</p>
        </div>
        <p class="status">● 服务运行中</p>
    </div>
</body>
</html>
