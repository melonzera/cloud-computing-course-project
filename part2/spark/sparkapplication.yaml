# ============================================================
# 附录 B-1: SparkApplication CR 模板
# 部署前需安装 Spark Operator (通过 Helm)
#   helm install spark-op ./spark-operator-chart/ -n spark-operator --create-namespace
# ============================================================
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: pyspark-wordcount
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  # ← 替换为教师提供的 SWR PySpark 镜像地址
  image: swr.cn-north-4.myhuaweicloud.com/<YOUR_ORG>/pyspark:3.4
  mainApplicationFile: local:///opt/spark/work/wordcount.py
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    memory: "1g"
    serviceAccount: spark
  executor:
    cores: 1
    instances: 2          # 按任务要求设为 2
    memory: "1g"          # 按任务要求设为 1g
