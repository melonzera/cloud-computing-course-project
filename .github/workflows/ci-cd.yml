# ============================================================
# 云计算技术课程设计 — 端到端 CI/CD 流水线
# 触发条件: Push 到 main 分支 / 手动触发
# 流程: Checkout → Test → Build → Push SWR → Deploy CCE → Verify
# ============================================================
name: CI/CD Pipeline — Build → Push SWR → Deploy CCE

on:
  push:
    branches: [main]
    paths:
      - 'part1/**'          # 仅 part1 目录变更时触发
      - '.github/workflows/ci-cd.yml'
  workflow_dispatch:        # 允许手动触发

env:
  # ── 华为云 SWR 配置 ─────────────────────────────
  SWR_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  SWR_ORG: ${{ secrets.SWR_ORG }}
  # ── 镜像 Tag（基于 Git commit SHA 前8位，可追溯） ──
  IMAGE_TAG: ${{ github.sha }}
  SHORT_SHA: ${{ github.sha }}

jobs:
  # ============================================================
  # Stage 0: 代码质量门禁（持续集成核心）
  # ============================================================
  code-quality:
    name: 🔍 Code Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd part1/backend
          pip install -r requirements.txt

      - name: Syntax Check (Backend)
        run: python -m py_compile part1/backend/app.py && echo "✓ Backend syntax OK"

      - name: Import Check (Backend)
        run: python -c "import flask; import redis; print('✓ All dependencies importable')"

      - name: Syntax Check (Spark Scripts)
        run: |
          python -m py_compile part2/spark/data_cleaning.py && echo "✓ data_cleaning OK"
          python -m py_compile part2/spark/wordcount.py && echo "✓ wordcount OK"
          python -m py_compile part2/spark/spark_sql_analysis.py && echo "✓ spark_sql OK"

  # ============================================================
  # Stage 1: 构建镜像 & 推送 SWR（持续集成 → 持续交付）
  # ============================================================
  build-and-push:
    name: 🐳 Build & Push to SWR
    needs: code-quality         # 质量门禁通过后才构建
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SWR_REGISTRY }}
          username: cn-north-4@${{ secrets.HW_ACCESS_KEY }}
          password: ${{ secrets.HW_SECRET_KEY }}

      - name: Build & Push ${{ matrix.service }}
        run: |
          SHORT_SHA=$(echo "${{ env.SHORT_SHA }}" | cut -c1-8)
          cd part1/${{ matrix.service }}

          echo ">>> Building ${{ matrix.service }} image..."
          docker build \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg VCS_REF=${{ env.SHORT_SHA }} \
            -t ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/${{ matrix.service }}:${SHORT_SHA} \
            -t ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/${{ matrix.service }}:latest \
            .

          echo ">>> Pushing ${{ matrix.service }}:${SHORT_SHA} ..."
          docker push ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/${{ matrix.service }}:${SHORT_SHA}

          echo ">>> Pushing ${{ matrix.service }}:latest ..."
          docker push ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/${{ matrix.service }}:latest

          echo "✓ ${{ matrix.service }} image pushed: ${SHORT_SHA} + latest"

      - name: Verify Image in SWR
        run: |
          SHORT_SHA=$(echo "${{ env.SHORT_SHA }}" | cut -c1-8)
          echo "Image: ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/${{ matrix.service }}:${SHORT_SHA}"
          echo "Status: ✓ Published"

  # ============================================================
  # Stage 2: 部署到 CCE 集群（持续部署）
  # ============================================================
  deploy-to-cce:
    name: 🚀 Deploy to CCE Cluster
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28'

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          echo "✓ Kubeconfig configured"
          kubectl version --client
          kubectl cluster-info | head -3

      - name: Apply K8s Resources (ConfigMap + Secret + PVC + Redis)
        run: |
          echo ">>> Applying base resources..."
          kubectl apply -f part1/k8s/configmap.yaml
          kubectl apply -f part1/k8s/secret.yaml
          kubectl apply -f part1/k8s/pvc.yaml
          kubectl apply -f part1/k8s/deployment-redis.yaml
          kubectl apply -f part1/k8s/service.yaml
          echo "✓ Base resources applied"

      - name: Update Backend Deployment Image Tag
        run: |
          SHORT_SHA=$(echo "${{ env.SHORT_SHA }}" | cut -c1-8)
          echo ">>> Updating backend → ${SHORT_SHA}"
          kubectl set image deployment/backend \
            backend=${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/backend:${SHORT_SHA} \
            --record
          echo "✓ Backend image updated"

      - name: Apply Frontend Deployment
        run: |
          SHORT_SHA=$(echo "${{ env.SHORT_SHA }}" | cut -c1-8)
          echo ">>> Applying frontend deployment → ${SHORT_SHA}"
          # 动态替换镜像 Tag 后 apply
          sed -i "s|__IMAGE_TAG__|${SHORT_SHA}|g" part1/k8s/deployment-frontend.yaml
          sed -i "s|__SWR_REGISTRY__|${{ env.SWR_REGISTRY }}|g" part1/k8s/deployment-frontend.yaml
          sed -i "s|__SWR_ORG__|${{ env.SWR_ORG }}|g" part1/k8s/deployment-frontend.yaml
          kubectl apply -f part1/k8s/deployment-frontend.yaml
          echo "✓ Frontend deployment applied"

      - name: Apply HPA
        run: |
          kubectl apply -f part1/k8s/hpa.yaml
          echo "✓ HPA applied"

      # ── 验证部署 ─────────────────────────────────
      - name: Verify Backend Rollout
        run: |
          echo ">>> Waiting for backend rollout..."
          kubectl rollout status deployment/backend --timeout=180s
          echo "✓ Backend rollout complete"

      - name: Verify Frontend Rollout
        run: |
          echo ">>> Waiting for frontend rollout..."
          kubectl rollout status deployment/frontend --timeout=180s
          echo "✓ Frontend rollout complete"

      - name: Show Deployment Status
        run: |
          echo "========================================="
          echo "  📦 Deployment Status"
          echo "========================================="
          echo ""
          echo "── Pods ──"
          kubectl get pods -o wide
          echo ""
          echo "── Deployments ──"
          kubectl get deployments -o wide
          echo ""
          echo "── Services ──"
          kubectl get svc
          echo ""
          echo "── Image Versions ──"
          kubectl get deployment backend -o jsonpath='{.spec.template.spec.containers[0].image}' && echo ""
          kubectl get deployment frontend -o jsonpath='{.spec.template.spec.containers[0].image}' && echo ""

  # ============================================================
  # Stage 3: 冒烟测试 / 健康检查
  # ============================================================
  health-check:
    name: 🩺 Health Check
    needs: deploy-to-cce
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28'

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Smoke Test — Backend /api/ping
        run: |
          # 获取 ELB 公网 IP
          ELB_IP=$(kubectl get svc backend-svc -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "ELB IP: $ELB_IP"

          # 等待 ELB 就绪（最多 30s）
          for i in {1..6}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://$ELB_IP/api/ping || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ /api/ping → 200 OK"
              break
            fi
            echo "Waiting for ELB... ($HTTP_CODE)"
            sleep 5
          done

          RESPONSE=$(curl -s http://$ELB_IP/api/ping)
          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"ok"'; then
            echo "✓ Health check PASSED"
          else
            echo "✗ Health check FAILED"
            exit 1
          fi

      - name: Smoke Test — Redis Connectivity
        run: |
          ELB_IP=$(kubectl get svc backend-svc -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          RESPONSE=$(curl -s http://$ELB_IP/api/redis/ping || echo '{"redis":"error"}')
          echo "Redis ping: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"connected"'; then
            echo "✓ Redis connection OK"
          else
            echo "⚠ Redis not connected (check if Redis pod is running)"
          fi

      - name: Smoke Test — Frontend
        run: |
          # 如果有前端独立的 Service，测试之
          ELB_IP=$(kubectl get svc backend-svc -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://$ELB_IP/api/ping || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ All smoke tests PASSED"
          else
            echo "✗ Smoke test FAILED"
            exit 1
          fi

  # ============================================================
  # Stage 4: GitOps — 将镜像 Tag 回写仓库（可选）
  # ============================================================
  gitops-tag-sync:
    name: 🔄 GitOps Tag Sync (Optional)
    needs: [health-check]
    if: github.event_name == 'push'    # 仅自动触发时执行
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Update Image Tag in Deployment YAML
        run: |
          SHORT_SHA=$(echo "${{ env.SHORT_SHA }}" | cut -c1-8)
          IMAGE="${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}"

          # 更新 backend deployment YAML 中的镜像 Tag
          sed -i "s|image: ${IMAGE}/backend:.*|image: ${IMAGE}/backend:${SHORT_SHA}|g" part1/k8s/deployment-backend.yaml
          sed -i "s|image: ${IMAGE}/frontend:.*|image: ${IMAGE}/frontend:${SHORT_SHA}|g" part1/k8s/deployment-frontend.yaml

          echo "Updated YAML files with tag: ${SHORT_SHA}"

      - name: Commit & Push Updated Manifests
        run: |
          SHORT_SHA=$(echo "${{ env.SHORT_SHA }}" | cut -c1-8)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 仅在有变更时提交
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add part1/k8s/deployment-backend.yaml part1/k8s/deployment-frontend.yaml
            git commit -m "ci: update image tag to ${SHORT_SHA} [skip ci]"
            git push origin main
            echo "✓ GitOps: image tag synced back to repo"
          fi
